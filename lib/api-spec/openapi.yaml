      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # Procurement
  /procurement/purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [procurement]
      parameters:
        - name: status
          in: query
          schema:
            type: string
