  # Tenders
  /tenders:
    get:
      operationId: listTenders
      tags: [tenders]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, submitted, under_evaluation, awarded, lost, cancelled]
      responses:
