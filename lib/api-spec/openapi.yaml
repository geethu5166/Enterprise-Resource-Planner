  # Inventory
  /inventory/materials:
    get:
      operationId: listMaterials
      tags: [inventory]
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [cement, steel, sand, aggregate, metal, wood, electrical, plumbing, other]
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialBody"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /inventory/materials/{id}:
    patch:
      operationId: updateMaterial
      tags: [inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaterialBody"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
