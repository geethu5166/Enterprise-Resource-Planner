    post:
      operationId: createPurchaseOrder
      tags: [procurement]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseOrderBody"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
