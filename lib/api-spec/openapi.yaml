  /vehicles/stats:
    get:
      operationId: getVehicleStats
      tags: [vehicles]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleStats"

  # HR
  /hr/employees:
    get:
      operationId: listEmployees
      tags: [hr]
      parameters:
        - name: department
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [hr]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /hr/employees/{id}:
    get:
      operationId: getEmployee
      tags: [hr]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    patch:
      operationId: updateEmployee
      tags: [hr]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /hr/summary:
    get:
      operationId: getHRSummary
      tags: [hr]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HRSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        totalRevenue:
          type: number
        pendingInvoices:
          type: number
        openTenders:
          type: integer
        vehiclesInMaintenance:
          type: integer
        lowStockItems:
          type: integer
        pendingPurchaseOrders:
          type: integer
        totalEmployees:
          type: integer
        monthlyExpenses:
          type: number
        monthlyIncome:
          type: number
      required:
        - totalProjects
        - activeProjects
        - totalRevenue
        - pendingInvoices
        - openTenders
        - vehiclesInMaintenance
        - lowStockItems
        - pendingPurchaseOrders
        - totalEmployees
        - monthlyExpenses
        - monthlyIncome

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        module:
          type: string
        createdAt:
          type: string
      required: [id, type, description, module, createdAt]

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        client:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [planning, active, on_hold, completed, cancelled]
        budget:
          type: number
        spent:
          type: number
        startDate:
          type: string
        endDate:
          type: string
        description:
          type: string
        progress:
          type: integer
        projectManager:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - code
        - client
        - location
        - status
        - budget
        - spent
        - startDate
        - endDate
        - progress
        - projectManager
        - createdAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        client:
          type: string
        location:
          type: string
        status:
          type: string
        budget:
          type: number
        startDate:
          type: string
        endDate:
          type: string
        description:
          type: string
        projectManager:
          type: string
      required: [name, code, client, location, budget, startDate, endDate, projectManager]

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        budget:
          type: number
        spent:
          type: number
        progress:
          type: integer
        description:
          type: string
        endDate:
          type: string

    ProjectStats:
      type: object
      properties:
        byStatus:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              count:
                type: integer
            required: [status, count]
        totalBudget:
          type: number
        totalSpent:
          type: number
      required: [byStatus, totalBudget, totalSpent]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        amount:
          type: number
        gstAmount:
          type: number
        description:
          type: string
        projectId:
          type: integer
        projectName:
          type: string
        date:
          type: string
        paymentMode:
          type: string
        reference:
          type: string
        createdAt:
          type: string
      required: [id, type, category, amount, gstAmount, description, date, createdAt]

    CreateTransactionBody:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        amount:
          type: number
        gstAmount:
          type: number
        description:
          type: string
        projectId:
          type: integer
        date:
          type: string
        paymentMode:
          type: string
        reference:
          type: string
      required: [type, category, amount, description, date]

    FinanceSummary:
      type: object
      properties:
        totalIncome:
          type: number
        totalExpense:
          type: number
        netProfit:
          type: number
        pendingReceivables:
          type: number
        pendingPayables:
          type: number
        gstCollected:
          type: number
        gstPaid:
          type: number
      required:
        - totalIncome
        - totalExpense
        - netProfit
        - pendingReceivables
        - pendingPayables
        - gstCollected
        - gstPaid

    MonthlyCashflow:
      type: object
      properties:
        month:
          type: string
        income:
          type: number
        expense:
          type: number
      required: [month, income, expense]

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        client:
          type: string
        projectId:
          type: integer
        projectName:
          type: string
        amount:
          type: number
        gstAmount:
          type: number
        totalAmount:
          type: number
        status:
          type: string
          enum: [draft, sent, paid, overdue]
        dueDate:
          type: string
        issueDate:
          type: string
        createdAt:
          type: string
      required: [id, invoiceNumber, client, amount, gstAmount, totalAmount, status, dueDate, issueDate, createdAt]

    CreateInvoiceBody:
      type: object
      properties:
        client:
          type: string
        projectId:
          type: integer
        amount:
          type: number
        gstAmount:
          type: number
        dueDate:
          type: string
        issueDate:
          type: string
      required: [client, amount, gstAmount, dueDate, issueDate]

    PurchaseOrder:
      type: object
      properties:
        id:
          type: integer
        poNumber:
          type: string
        vendorId:
          type: integer
        vendorName:
          type: string
        projectId:
          type: integer
        projectName:
          type: string
        status:
          type: string
          enum: [draft, pending_approval, approved, ordered, received, cancelled]
        totalAmount:
          type: number
        gstAmount:
          type: number
        description:
          type: string
        requiredDate:
          type: string
        createdAt:
          type: string
        items:
          type: array
          items:
